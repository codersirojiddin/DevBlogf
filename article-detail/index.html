<!DOCTYPE html>
<html lang="en">
<head>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4819817034021416"

     crossorigin="anonymous"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ither — Article</title>
    <link rel="stylesheet" href="/assets/style.css">
    <style>
        .article-wrapper {
            max-width: 780px;
            margin: 40px auto;
            padding: 0 20px 80px;
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: #555;
            text-decoration: none;
            font-size: 0.9rem;
            margin-bottom: 28px;
            transition: color 0.15s;
        }

        .back-btn:hover { color: #2563eb; }

        .article-type-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.78rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 16px;
        }

        .article-type-badge.article { background: #dbeafe; color: #1d4ed8; }
        .article-type-badge.news { background: #fef9c3; color: #854d0e; }
        .article-type-badge.code { background: #dcfce7; color: #166534; }

        .article-title {
            font-size: 2.2rem;
            font-weight: 800;
            line-height: 1.2;
            margin: 0 0 16px;
            color: #111;
        }

        .article-meta {
            display: flex;
            align-items: center;
            gap: 16px;
            color: #888;
            font-size: 0.88rem;
            margin-bottom: 36px;
            padding-bottom: 24px;
            border-bottom: 1px solid #f1f5f9;
            flex-wrap: wrap;
        }

        .article-meta span { display: flex; align-items: center; gap: 4px; }

        .article-content {
            font-size: 1.05rem;
            line-height: 1.85;
            color: #222;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .article-content p { margin-bottom: 20px; }

        .highlighted-banner {
            display: flex;
            align-items: center;
            gap: 8px;
            background: linear-gradient(135deg, #fef3c7, #fde68a);
            border-radius: 10px;
            padding: 12px 18px;
            font-size: 0.88rem;
            font-weight: 600;
            color: #92400e;
            margin-bottom: 28px;
        }

        .owner-actions {
            display: flex;
            gap: 10px;
            margin-bottom: 32px;
        }

        .btn-danger {
            background: #fee2e2;
            color: #dc2626;
            border: none;
            padding: 8px 18px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9rem;
            transition: background 0.15s;
        }

        .btn-danger:hover { background: #fecaca; }

        .divider {
            border: none;
            border-top: 1px solid #f1f5f9;
            margin: 40px 0;
        }

        /* Related articles */
        .related-section h3 {
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 16px;
            color: #111;
        }

        .related-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 16px;
        }

        .related-card {
            background: white;
            border-radius: 10px;
            padding: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            cursor: pointer;
            transition: transform 0.15s, box-shadow 0.15s;
            text-decoration: none;
            display: block;
        }

        .related-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(0,0,0,0.1);
        }

        .related-card h4 {
            font-size: 0.9rem;
            font-weight: 700;
            color: #111;
            margin: 0 0 8px;
            line-height: 1.3;
        }

        .related-card p {
            font-size: 0.8rem;
            color: #888;
            margin: 0;
        }
    </style>
</head>
<body>
    <script src="/lib/header.js"></script>

    <div class="article-wrapper" id="article-wrapper">
        <div class="loading-state" style="text-align:center;padding:60px">
            <div class="spinner"></div> Loading article...
        </div>
    </div>

    <script src="/lib/supabase.js"></script>
    <script src="/lib/user-menu.js"></script>
    <script>
        const params = new URLSearchParams(window.location.search);
        const articleId = params.get("id");
        const currentUser = window.SupabaseClient.getCurrentUser();

        if (!articleId) window.location.href = "/articles/index.html";

        document.addEventListener("DOMContentLoaded", () => {
            initializeUserMenu();
        });

        function escapeHtml(str) {
            return String(str || "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
        }

        function formatDate(str) {
            return new Date(str).toLocaleDateString("en-US", {
                year: "numeric", month: "long", day: "numeric"
            });
        }

        async function loadArticle() {
            const wrapper = document.getElementById("article-wrapper");
            try {
                const data = await window.SupabaseClient.supabaseFetch(
                    `posts?id=eq.${articleId}&select=*`
                );
                const article = data?.[0];

                if (!article) {
                    wrapper.innerHTML = `<p>Article not found. <a href="/articles/index.html">Go back</a></p>`;
                    return;
                }

                document.title = `DevBlog — ${article.title}`;

                // Check if admin/owner (you can adjust this logic)
                const isAdmin = currentUser?.email === "codersirojiddin@gmail.com"; // change this to your email

                wrapper.innerHTML = `
                    <a href="/articles/index.html" class="back-btn">← Back to Articles</a>

                    ${article.highlighted ? `
                        <div class="highlighted-banner">
                            ⭐ Featured Article
                        </div>
                    ` : ""}

                    <span class="article-type-badge ${article.type || 'article'}">${article.type || 'article'}</span>

                    <h1 class="article-title">${escapeHtml(article.title)}</h1>

                    <div class="article-meta">
                        <span>📅 ${formatDate(article.created_at)}</span>
                        ${article.updated_at !== article.created_at
                            ? `<span>✏️ Updated ${formatDate(article.updated_at)}</span>`
                            : ""}
                    </div>

                    ${isAdmin ? `
                        <div class="owner-actions">
                            <button class="btn btn--secondary" id="edit-btn">✏️ Edit</button>
                            <button class="btn-danger" id="delete-btn">🗑️ Delete</button>
                        </div>
                    ` : ""}

                    <div class="article-content">${escapeHtml(article.content)}</div>

                    <hr class="divider">

                    <div class="related-section">
                        <h3>More Articles</h3>
                        <div class="related-grid" id="related-grid">
                            <div style="color:#888;font-size:0.9rem">Loading...</div>
                        </div>
                    </div>
                `;

                // Delete button
                if (isAdmin) {
                    document.getElementById("delete-btn")?.addEventListener("click", async () => {
                        if (!confirm("Delete this article? This cannot be undone.")) return;
                        try {
                            await window.SupabaseClient.supabaseFetch(`posts?id=eq.${articleId}`, {
                                method: "DELETE",
                                prefer: "return=minimal"
                            });
                            window.location.href = "/articles/index.html";
                        } catch (err) {
                            alert("Failed to delete: " + err.message);
                        }
                    });
                }

                // Load related articles
                loadRelated(article.type, articleId);

            } catch (err) {
                wrapper.innerHTML = `<p>Failed to load article: ${err.message}</p>`;
            }
        }

        async function loadRelated(type, currentId) {
            const grid = document.getElementById("related-grid");
            if (!grid) return;
            try {
                const data = await window.SupabaseClient.supabaseFetch(
                    `posts?type=eq.${type}&id=neq.${currentId}&order=created_at.desc&limit=3&select=id,title,created_at`
                );

                if (!data || data.length === 0) {
                    grid.innerHTML = `<p style="color:#888;font-size:0.9rem">No related articles found.</p>`;
                    return;
                }

                grid.innerHTML = data.map(post => `
                    <a class="related-card" href="/article-detail/index.html?id=${post.id}">
                        <h4>${escapeHtml(post.title)}</h4>
                        <p>${formatDate(post.created_at)}</p>
                    </a>
                `).join("");

            } catch (err) {
                grid.innerHTML = "";
            }
        }

        loadArticle();
    </script>
</body>
</html>
