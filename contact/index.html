<!DOCTYPE html>
<html lang="en">

<head>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4819817034021416"

     crossorigin="anonymous"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ither — Contact</title>
    <link rel="stylesheet" href="/assets/style.css">

    <style>
        .contact-wrapper {
            max-width: 680px;
            margin: 3rem auto;
            padding: 0 1.5rem;
        }

        .contact-header {
            margin-bottom: 2rem;
            border-bottom: 1px solid #e5e7eb;
            padding-bottom: 1.5rem;
        }

        .contact-header h1 {
            font-size: 2.2rem;
            font-weight: 600;
            color: #111;
            margin: 0 0 0.5rem;
        }

        .contact-header p {
            font-size: 15px;
            color: #555;
            line-height: 1.7;
            margin: 0;
        }

        .contact-card {
            background: #fff;
            border: 1px solid #e5e7eb;
            border-radius: 12px;
            padding: 1.5rem;
        }

        .contact-links {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 1.5rem;
        }

        .contact-link-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 0.75rem 1rem;
            background: #f9fafb;
            border-radius: 8px;
            text-decoration: none;
        }

        .link-icon {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
        }

        .link-icon.email {
            background: #dbeafe;
            color: #1e40af;
        }

        .link-icon.web {
            background: #d1fae5;
            color: #065f46;
        }

        .link-label {
            font-size: 12px;
            color: #888;
            margin: 0 0 2px;
        }

        .link-value {
            font-size: 14px;
            font-weight: 600;
            color: #2563eb;
            margin: 0;
            text-decoration: underline;
        }

        /* FEEDBACK */
        .feedback-box {
            margin-top: 2rem;
            padding-top: 1.5rem;
            border-top: 1px solid #e5e7eb;
        }

        .feedback-box h3 {
            font-size: 16px;
            margin-bottom: 10px;
            color: #111;
        }

        .feedback-box textarea {
            width: 100%;
            height: 120px;
            padding: 12px;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            resize: none;
            font-size: 14px;
            outline: none;
        }

        .feedback-box button {
            margin-top: 10px;
            width: 100%;
            padding: 10px;
            border: none;
            background: #2563eb;
            color: white;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
        }

        .feedback-box button:hover {
            background: #1d4ed8;
        }

        #status {
            margin-top: 8px;
            font-size: 13px;
        }
    </style>
</head>

<body>
    <script src="/lib/header.js"></script>

    <div class="contact-wrapper">

        <div class="contact-header">
            <h1>Contact Us</h1>
            <p>We're always open to ideas, collaborations, and opportunities. If you have a question, a project, or just want to connect — don't hesitate to reach out.</p>
        </div>

        <div class="contact-card">

            <div class="contact-links">
                <a href="mailto:codersirojiddin@gmail.com" class="contact-link-item">
                    <div class="link-icon email">✉</div>
                    <div>
                        <p class="link-label">Email</p>
                        <p class="link-value">codersirojiddin@gmail.com</p>
                    </div>
                </a>

                <a href="https://ither.online" class="contact-link-item">
                    <div class="link-icon web">🌐</div>
                    <div>
                        <p class="link-label">Website</p>
                        <p class="link-value">ither.online</p>
                    </div>
                </a>
            </div>

            <!-- FEEDBACK -->
            <div class="feedback-box">
                <h3>Send Feedback</h3>

                <form id="feedback-form">
                    <textarea id="message" placeholder="Write your feedback..." required></textarea>
                    <button type="submit">Send</button>
                </form>

                <p id="status"></p>
            </div>

        </div>
    </div>

    <!-- EMAILJS FIXED CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

    <script>
        (function () {
            emailjs.init("rFX8m5omCDm0HYfqJ");
        })();

        document.getElementById("feedback-form").addEventListener("submit", function (e) {
            e.preventDefault();

            let msg = document.getElementById("message").value;
            let status = document.getElementById("status");

            status.style.color = "black";
            status.innerText = "Sending...";

            emailjs.send("service_igjqmwj", "template_rxccfgb", {
                message: msg
            })
            .then((res) => {
                console.log("SUCCESS", res);
                status.style.color = "green";
                status.innerText = "Sent successfully 🚀";
                document.getElementById("message").value = "";
            })
            .catch((err) => {
                console.log("ERROR", err);
                status.style.color = "red";
                status.innerText = "Failed ❌ (check console)";
            });
        });
    </script>

    <script src="/lib/supabase.js"></script>
    <script src="/lib/user-menu.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            initializeUserMenu();
        });
    </script>

</body>
</html>
